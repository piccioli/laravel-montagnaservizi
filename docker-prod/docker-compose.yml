services:

  # ── Web server ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../src:/var/www/html:ro
      - storage:/var/www/html/storage/app/public
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ms-prod.rule=Host(`www.montagnaservizi.com`,`montagnaservizi.com`)"
      - "traefik.http.routers.ms-prod.entrypoints=websecure"
      - "traefik.http.routers.ms-prod.tls.certresolver=letsencrypt"
      - "traefik.http.services.ms-prod.loadbalancer.server.port=80"
      # Redirect montagnaservizi.com → www
      - "traefik.http.middlewares.ms-www.redirectregex.regex=^https://montagnaservizi\\.com/(.*)"
      - "traefik.http.middlewares.ms-www.redirectregex.replacement=https://www.montagnaservizi.com/$${1}"
      - "traefik.http.middlewares.ms-www.redirectregex.permanent=true"
      - "traefik.http.routers.ms-prod.middlewares=ms-www"
    networks:
      - web
      - internal

  # ── PHP-FPM ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ../src:/var/www/html
      - storage:/var/www/html/storage/app/public
    env_file: ../.env.prod
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ── Database ────────────────────────────────────────────────────
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ms_laravel}
      MYSQL_USER: ${DB_USERNAME:-ms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD required}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  db_data:
  storage:

networks:
  web:
    external: true
  internal:
    driver: bridge
