services:

  # ── Web server ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ../src:/var/www/html:ro
      - storage:/var/www/html/storage/app/public
    depends_on:
      - app
    container_name: ms-uat-nginx
    networks:
      - infra
      - internal

  # ── PHP-FPM ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ../src:/var/www/html
      - storage:/var/www/html/storage/app/public
    env_file: ../.env.uat
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ── Database ────────────────────────────────────────────────────
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ms_laravel}
      MYSQL_USER: ${DB_USERNAME:-ms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD required}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  db_data:
  storage:

networks:
  # Rete condivisa con montagnaservizi-infra (nginx edge su :80/:443)
  infra:
    external: true
    name: montagnaservizi-infra_internal
  internal:
    driver: bridge
