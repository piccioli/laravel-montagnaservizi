server {
    listen 80;
    server_name uat.montagnaservizi.com;
    root /var/www/html/public;

    # HTTP Basic Auth — protegge l'UAT durante lo sviluppo
    auth_basic           "Montagna Servizi UAT — Accesso riservato";
    auth_basic_user_file /etc/nginx/.htpasswd;

    index index.php;
    charset utf-8;

    # Favicon e robots senza log
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; auth_basic off; }

    # Storage pubblico (foto, cover, ecc.)
    location /storage/ {
        alias /var/www/html/public/storage/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Asset CSS/JS/img
    location ~* \.(css|js|ico|jpg|jpeg|png|gif|webp|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass             app:9000;
        fastcgi_index            index.php;
        fastcgi_param            SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                  fastcgi_params;
        fastcgi_read_timeout     60;
        fastcgi_buffer_size      16k;
        fastcgi_buffers          4 16k;
    }

    # Blocca accesso a file nascosti (.env, .git, ecc.)
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
